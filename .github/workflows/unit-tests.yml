name: Unit tests

on:
  workflow_dispatch:
  pull_request:

env:
  PYTHON_VERSION: '3.10'

concurrency: # run only one instance of the tests per branch
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true # cancel currently running checks on a new push

jobs:
  setup:
    name: Run demo scripts
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -e .[demo]
        echo "List of pip-installed modules:"
        pip list

    - name: Cache demo files
      id: cache-demo-files
      uses: actions/cache@v5
      with:
        key: demo-files
        path: |
          demo/*.h5

    - name: Download demo files
      if: steps.cache-demo-files.outputs.cache-hit != 'true'
      working-directory: ./demo
      run: |
        ./download_demo_data.sh

    - name: Fourier interpolation
      working-directory: ./demo
      run:
        python demo_interpolation_fourier.py

    - name: Signal interpolation
      working-directory: ./demo
      run:
        python demo_signal_interpolation.py

    - name: Minimal usage demo
      working-directory: ./demo
      run:
        python minimal_usage_demo.py

